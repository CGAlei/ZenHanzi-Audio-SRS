<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>ZenHanzi · Audio Trainer</title>
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="style.css">
</head>

<body
  class="bg-zinc-950 text-white selection:bg-sky-500/30 font-sans min-h-[100dvh] flex justify-center items-center md:py-8 md:px-4">
  <!-- Mesh Background -->
  <div class="mesh-bg fixed top-0 left-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
    <div class="blob blob-1 absolute rounded-full blur-[80px] opacity-40 -top-24 -left-24 w-96 h-96 bg-indigo-600">
    </div>
    <div
      class="blob blob-2 absolute rounded-full blur-[80px] opacity-40 -bottom-24 -right-24 w-[500px] h-[500px] bg-purple-600">
    </div>
    <div
      class="blob blob-3 absolute rounded-full blur-[80px] opacity-40 top-1/5 right-10 w-[300px] h-[300px] bg-sky-500">
    </div>
  </div>

  <div id="app"
    class="w-full h-[100dvh] md:h-[800px] max-w-md relative overflow-hidden flex flex-col md:glass md:rounded-[24px]">

    <!-- Toast notification -->
    <div id="toast"
      class="absolute top-4 left-1/2 -translate-x-1/2 glass-panel px-6 py-2 rounded-full font-medium text-sm transition-all duration-300 opacity-0 pointer-events-none z-50">
    </div>

    <!-- Pantalla de bienvenida -->
    <div id="welcomeScreen" class="screen active flex-1 flex flex-col p-6 md:p-8 transition-opacity duration-300">
      <div class="flex-1 flex flex-col justify-center items-center space-y-2">
        <h1 class="text-4xl md:text-5xl font-display font-bold tracking-tight">
          Zen<span class="bg-gradient-to-r from-sky-400 to-indigo-400 text-gradient">Hanzi</span>
        </h1>
        <p class="welcome-subtitle text-slate-300 text-sm md:text-base font-medium tracking-wide pb-8 opacity-80">
          Audio Trainer · Mandarin
        </p>

        <div class="stats-preview w-full grid grid-cols-3 gap-3 mb-10">
          <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
            <span id="statDue" class="text-2xl font-bold text-sky-400">0</span>
            <span class="label text-xs text-slate-400 uppercase tracking-widest mt-1 font-semibold">Due</span>
          </div>
          <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
            <span id="statNew" class="text-2xl font-bold text-indigo-400">0</span>
            <span class="label text-xs text-slate-400 uppercase tracking-widest mt-1 font-semibold">New</span>
          </div>
          <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
            <span id="statFav" class="text-2xl font-bold text-purple-400">0</span>
            <span class="label text-xs text-slate-400 uppercase tracking-widest mt-1 font-semibold">Fav</span>
          </div>
        </div>

        <div class="session-buttons w-full space-y-3">
          <button id="continueSrsBtn"
            class="w-full py-4 px-6 bg-sky-500 rounded-2xl text-white font-semibold flex items-center justify-center gap-3 shadow-lg shadow-sky-500/20 hover:shadow-sky-500/40 transition-all">
            📚 Continue SRS
          </button>
          <div class="grid grid-cols-2 gap-3">
            <button id="newWordsBtn"
              class="glass-panel py-4 px-4 hover:bg-white/10 rounded-2xl font-medium flex items-center justify-center gap-2 transition-colors text-indigo-400">
              ✨ New Words
            </button>
            <button id="favoritesBtn"
              class="glass-panel py-4 px-4 hover:bg-white/10 rounded-2xl font-medium flex items-center justify-center gap-2 transition-colors text-purple-400">
              ❤️ Favorites
            </button>
          </div>
        </div>
      </div>

      <div class="import-export flex justify-center gap-6 pt-6 border-t border-white/10 text-slate-400">
        <button id="exportBtn"
          class="flex items-center gap-2 text-sm hover:text-white transition-colors">Export</button>
        <button id="importBtn"
          class="flex items-center gap-2 text-sm hover:text-white transition-colors">Import</button>
        <input type="file" id="importFile" accept=".json" class="hidden">
      </div>
    </div>

    <!-- Pantalla de sesión (quiz) -->
    <div id="sessionScreen" class="screen hidden flex-1 flex flex-col p-4 md:p-6 pb-8 transition-opacity duration-300">

      <div class="absolute top-0 left-0 w-full h-1.5 bg-white/5">
        <div id="progressFill"
          class="progress-fill h-full bg-sky-400 drop-shadow-[0_0_8px_rgba(56,189,248,0.8)] w-0 transition-all duration-300">
        </div>
      </div>

      <div class="session-header flex items-center justify-between mb-8 mt-4 relative z-10">
        <div class="text-sm font-medium text-slate-300 glass-panel px-3 py-1 rounded-full">
          <span id="wordCounter">0 / 0</span>
        </div>
        <button id="exitSessionBtn"
          class="exit p-2 glass-panel hover:bg-white/10 text-slate-300 hover:text-white rounded-full transition-colors">
          ✕
        </button>
      </div>

      <div class="question-area flex-1 flex flex-col items-center justify-center text-center relative z-10">
        <div id="hanziDisplay"
          class="hanzi text-7xl md:text-8xl font-cjk font-normal tracking-widest text-white drop-shadow-[0_4px_16px_rgba(0,0,0,0.5)] mb-4">
          —</div>
        <div class="flex flex-col items-center gap-4 mb-8 h-32 justify-start">
          <div id="pinyinHint"
            class="pinyin text-2xl font-display text-sky-400 font-medium h-8 flex items-center justify-center"></div>

          <button id="replayBtn"
            class="replay w-12 h-12 flex shrink-0 items-center justify-center rounded-full glass-panel text-slate-300 hover:text-white hover:bg-white/10 transition-colors cursor-pointer border-none">🔊</button>

          <button id="helpBtn"
            class="help-btn hidden px-4 py-1.5 rounded-full glass-panel text-sm text-slate-300 flex items-center gap-2 hover:bg-white/10 hover:text-white transition-colors cursor-pointer border-none">
            💡 Context Help
          </button>
        </div>
      </div>

      <div class="answer-area w-full space-y-3 relative z-10">
        <div id="feedback"
          class="feedback absolute -top-16 inset-x-0 mx-auto px-6 py-3 rounded-2xl font-bold text-center border backdrop-blur-md shadow-2xl z-20 hidden">
        </div>

        <div id="responseButtons" class="response-buttons space-y-3">
          <!-- JS will inject buttons here -->
        </div>

        <div id="engineBadge"
          class="engine-badge glass-panel mt-4 text-center text-xs font-semibold py-2 rounded-xl text-slate-400 hidden">
        </div>

        <div id="voiceStatus"
          class="voice-status hidden w-full px-6 py-3 mt-4 rounded-full flex items-center justify-center gap-3 transition-all glass-panel text-slate-300">
          <span class="mic-icon">🎤</span>
          <span class="mic-text text-sm font-semibold tracking-wide">Listening...</span>
          <div class="sound-wave flex gap-1 ml-2"><span></span><span></span><span></span><span></span></div>
        </div>
      </div>

      <!-- Keyboard hint -->
      <div class="keyboard-hint text-center text-xs text-slate-500 mt-6 relative z-10">
        <span class="glass-panel px-2 py-1 rounded">1-4</span> select · <span
          class="glass-panel px-2 py-1 rounded">H</span> hint · <span class="glass-panel px-2 py-1 rounded">R</span>
        replay · <span class="glass-panel px-2 py-1 rounded">Esc</span> exit
      </div>
    </div>

    <!-- Pantalla de resumen -->
    <div id="summaryScreen"
      class="screen hidden flex-1 flex flex-col items-center justify-center p-6 md:p-8 relative transition-opacity duration-300">
      <div
        class="w-20 h-20 rounded-full bg-sky-500/20 border border-sky-500/30 flex items-center justify-center text-sky-400 mb-6 shadow-[0_0_40px_rgba(56,189,248,0.2)] text-4xl">
        ✨</div>

      <h2 class="text-3xl font-display font-bold text-white mb-2">Session Complete</h2>
      <p class="text-slate-400 mb-10 text-center">Great job! You're building a strong habit.</p>

      <div class="summary-stats w-full grid grid-cols-3 gap-3 mb-10">
        <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
          <span id="summaryReviewed" class="text-2xl font-bold text-white">0</span>
          <span class="label text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Reviewed</span>
        </div>
        <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
          <span id="summaryNew" class="text-2xl font-bold text-white">0</span>
          <span class="label text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">New</span>
        </div>
        <div class="glass-card rounded-2xl p-4 flex flex-col items-center justify-center">
          <span id="summaryAccuracy" class="text-2xl font-bold text-white">0%</span>
          <span class="label text-[10px] text-slate-400 uppercase tracking-widest mt-1 font-semibold">Accuracy</span>
        </div>
      </div>

      <div class="w-full space-y-3">
        <button id="newSessionBtn"
          class="w-full py-4 px-6 bg-white hover:bg-slate-200 text-slate-900 rounded-2xl font-bold flex items-center justify-center gap-3 transition-colors shadow-lg">
          Another Session
        </button>
        <button id="dashboardBtn"
          class="w-full py-4 px-6 glass-panel hover:bg-white/10 text-white rounded-2xl font-medium flex items-center justify-center gap-3 transition-colors">
          Back to Home
        </button>
      </div>
    </div>
  </div>


  <script src="/vosk.js"></script>
  <script src="/app.js"></script>
</body>

</html>
